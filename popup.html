<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Amazon Pinterest Helper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 420px;
      padding: 12px;
      margin: 0;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 8px;
      font-size: 12px;
    }

    textarea {
      min-height: 60px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 0;
      background: #111;
      color: white;
      border-radius: 8px;
    }

    button.secondary {
      background: #444;
    }

    .status {
      font-size: 12px;
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 8px;
    }

    .item-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .item-meta {
      font-size: 11px;
      color: #555;
      margin-bottom: 6px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row button {
      margin-bottom: 0;
    }

    .thumb {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>Amazon Pinterest Helper</h1>

  <label for="affiliateTag">Tag de afiliado</label>
  <input id="affiliateTag" placeholder="ex: seucodigo-20" />

  <button id="extractAndSaveBtn">Extrair e salvar produto atual</button>
  <button id="openPinterestBtn">Abrir Pinterest</button>
  <button id="clearAllBtn" class="secondary">Limpar lista</button>

  <div id="status" class="status"></div>

  <hr />

  <div id="itemsContainer"></div>

  <script src="popup.js"></script>
</body>
</html>
