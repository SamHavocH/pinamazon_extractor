<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Amazon Pinterest Helper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 360px;
      padding: 12px;
      margin: 0;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 8px;
      font-size: 12px;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 0;
      background: #111;
      color: white;
      border-radius: 8px;
    }

    button.secondary {
      background: #444;
    }

    .status {
      font-size: 12px;
      margin-top: 8px;
      color: #333;
      white-space: pre-wrap;
    }

    .preview {
      width: 100%;
      max-height: 160px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Amazon Pinterest Helper</h1>

  <label for="affiliateTag">Tracking ID / tag de afiliado</label>
  <input id="affiliateTag" placeholder="ex: meusite-20" />

  <button id="extractBtn">Extrair dados do produto</button>

  <img id="previewImage" class="preview" style="display:none;" />

  <label for="title">Nome</label>
  <textarea id="title"></textarea>

  <label for="description">Descrição</label>
  <textarea id="description"></textarea>

  <label for="imageUrl">URL da imagem</label>
  <textarea id="imageUrl"></textarea>

  <label for="affiliateUrl">Link afiliado</label>
  <textarea id="affiliateUrl"></textarea>

  <button id="copyJsonBtn" class="secondary">Copiar JSON</button>
  <button id="downloadImageBtn" class="secondary">Baixar imagem</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
